name: crossy_road_tv
description: "Crossy Road game for Android TV / Google TV"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  audioplayers: ^6.6.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_sikto"
  ios: false
  image_path: "assets/img/sikto.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/img/
    - assets/audio/
